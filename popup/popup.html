<!DOCTYPE html>
<html lang="zh-CN" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRISM 棱镜</title>
  <link rel="stylesheet" href="../themes/default.css">
  <link rel="stylesheet" href="../themes/dark.css">
  <link rel="stylesheet" href="../themes/ocean.css">
  <link rel="stylesheet" href="../themes/sakura.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 顶部栏 -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🔷</span>
      <h1 class="title">PRISM 棱镜</h1>
    </div>
    <div class="header-right">
      <button id="btn-refresh" class="icon-btn" title="刷新资源">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.65 2.35A7.96 7.96 0 008 0C3.58 0 .01 3.58.01 8S3.58 16 8 16c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 012 8a6 6 0 016-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>
      <button id="btn-stats" class="icon-btn" title="统计面板">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="9" width="3" height="6" rx="0.5" fill="currentColor"/>
          <rect x="6" y="5" width="3" height="10" rx="0.5" fill="currentColor"/>
          <rect x="11" y="1" width="3" height="14" rx="0.5" fill="currentColor"/>
        </svg>
      </button>
      <button id="btn-waterfall" class="icon-btn" title="瀑布图">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="0" y="1" width="10" height="2" rx="0.5" fill="currentColor"/>
          <rect x="2" y="5" width="12" height="2" rx="0.5" fill="currentColor"/>
          <rect x="1" y="9" width="8" height="2" rx="0.5" fill="currentColor"/>
          <rect x="4" y="13" width="11" height="2" rx="0.5" fill="currentColor"/>
        </svg>
      </button>
      <button id="btn-theme" class="icon-btn" title="切换主题">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="4" fill="currentColor"/>
          <path d="M8 0v2M8 14v2M0 8h2M14 8h2M2.34 2.34l1.42 1.42M12.24 12.24l1.42 1.42M2.34 13.66l1.42-1.42M12.24 3.76l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <a id="btn-options" class="icon-btn" href="#" title="设置">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 5.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5zM6.5 8a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z" fill="currentColor"/>
          <path fill-rule="evenodd" d="M8 1a.5.5 0 01.5.5v.517a4.978 4.978 0 011.334.562l.365-.365a.5.5 0 11.707.707l-.365.365A4.978 4.978 0 0111.203 4.5h.517a.5.5 0 010 1h-.517a4.978 4.978 0 01-.562 1.334l.365.365a.5.5 0 11-.707.707l-.365-.365A4.978 4.978 0 019.5 8.203v.517a.5.5 0 01-1 0v-.517a4.978 4.978 0 01-1.334-.562l-.365.365a.5.5 0 11-.707-.707l.365-.365A4.978 4.978 0 015.797 6.5H5.28a.5.5 0 010-1h.517a4.978 4.978 0 01.562-1.334l-.365-.365a.5.5 0 11.707-.707l.365.365A4.978 4.978 0 017.5 2.017V1.5A.5.5 0 018 1z" fill="currentColor"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- 页面信息 -->
  <div class="page-info" id="page-info">
    <span class="page-url" id="page-url" title="">加载中...</span>
  </div>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <input type="text" id="search-input" class="search-input" placeholder="搜索资源 URL、域名...">
    <div class="search-filters">
      <label class="filter-chip">
        <input type="checkbox" id="filter-external" checked>
        <span>外部资源</span>
      </label>
      <label class="filter-chip">
        <input type="checkbox" id="filter-large">
        <span>大文件 (>100KB)</span>
      </label>
      <label class="filter-chip">
        <input type="checkbox" id="filter-slow">
        <span>慢加载 (>1s)</span>
      </label>
      <div class="ext-filter-wrapper">
        <button id="btn-ext-filter" class="filter-chip ext-filter-btn">
          <span>📁 后缀筛选</span>
          <span class="ext-filter-arrow">▾</span>
        </button>
        <div id="ext-dropdown" class="ext-dropdown" style="display:none;">
          <div class="ext-dropdown-header">
            <button id="ext-select-all" class="ext-action">全选</button>
            <button id="ext-deselect-all" class="ext-action">清空</button>
          </div>
          <div id="ext-list" class="ext-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 分类 Tab -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="images">
      🖼️ 图片 <span class="tab-count" id="count-images">0</span>
    </button>
    <button class="tab" data-tab="scripts">
      📜 脚本 <span class="tab-count" id="count-scripts">0</span>
    </button>
    <button class="tab" data-tab="styles">
      🎨 样式 <span class="tab-count" id="count-styles">0</span>
    </button>
    <button class="tab" data-tab="fonts">
      🔤 字体 <span class="tab-count" id="count-fonts">0</span>
    </button>
    <button class="tab" data-tab="videos">
      🎬 视频 <span class="tab-count" id="count-videos">0</span>
    </button>
    <button class="tab" data-tab="audios">
      🔊 音频 <span class="tab-count" id="count-audios">0</span>
    </button>
    <button class="tab" data-tab="links">
      🔗 链接 <span class="tab-count" id="count-links">0</span>
    </button>
    <button class="tab" data-tab="third-party">
      📦 第三方 <span class="tab-count" id="count-third-party">0</span>
    </button>
  </div>

  <!-- 批量操作栏 -->
  <div class="batch-bar" id="batch-bar" style="display:none;">
    <span class="batch-info">
      已选 <strong id="selected-count">0</strong> 项
    </span>
    <div class="batch-actions">
      <button id="btn-select-all" class="btn-sm">全选</button>
      <button id="btn-deselect-all" class="btn-sm">取消</button>
      <button id="btn-download-selected" class="btn-sm btn-primary">📥 下载选中</button>
      <button id="btn-export-zip" class="btn-sm btn-accent">📦 导出 ZIP</button>
    </div>
  </div>

  <!-- 资源列表 -->
  <div class="resource-list" id="resource-list">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>正在提取资源...</span>
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <span class="empty-icon">📭</span>
      <span>未找到相关资源</span>
    </div>
    <div class="list-content" id="list-content"></div>
  </div>

  <!-- 统计面板 (覆盖层) -->
  <div class="overlay" id="stats-overlay" style="display:none;">
    <div class="panel stats-panel">
      <div class="panel-header">
        <h2>📊 资源统计</h2>
        <button class="panel-close" data-close="stats-overlay">&times;</button>
      </div>
      <div class="panel-body" id="stats-body"></div>
    </div>
  </div>

  <!-- 瀑布图面板 (覆盖层) -->
  <div class="overlay" id="waterfall-overlay" style="display:none;">
    <div class="panel waterfall-panel">
      <div class="panel-header">
        <h2>📈 加载瀑布图</h2>
        <button class="panel-close" data-close="waterfall-overlay">&times;</button>
      </div>
      <div class="panel-body waterfall-body" id="waterfall-body"></div>
    </div>
  </div>

  <!-- 主题切换面板 -->
  <div class="theme-dropdown" id="theme-dropdown" style="display:none;">
    <div class="theme-option" data-theme-value="default">
      <span class="theme-preview default-preview"></span>
      <span>☀️ 默认</span>
    </div>
    <div class="theme-option" data-theme-value="dark">
      <span class="theme-preview dark-preview"></span>
      <span>🌙 暗黑</span>
    </div>
    <div class="theme-option" data-theme-value="ocean">
      <span class="theme-preview ocean-preview"></span>
      <span>🌊 海洋</span>
    </div>
    <div class="theme-option" data-theme-value="sakura">
      <span class="theme-preview sakura-preview"></span>
      <span>🌸 樱花</span>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../lib/simple-zip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
