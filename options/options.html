<!DOCTYPE html>
<html lang="zh-CN" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="../themes/default.css">
  <link rel="stylesheet" href="../themes/dark.css">
  <link rel="stylesheet" href="../themes/ocean.css">
  <link rel="stylesheet" href="../themes/sakura.css">
  <link rel="stylesheet" href="options.css">
  <script src="../lib/i18n.js"></script>
</head>
<body>
  <div class="options-container">
    <header class="options-header">
      <h1>⚙️ <span data-i18n="extensionName">PRISM 棱镜</span> <span data-i18n="settings">设置</span></h1>
      <p class="subtitle" data-i18n="optionsSubtitle">自定义插件外观和行为</p>
    </header>

    <!-- 主题选择 -->
    <section class="options-section">
      <h2>🎨 <span data-i18n="themeSectionTitle">皮肤主题</span></h2>
      <p class="section-desc" data-i18n="themeSectionDesc">选择你喜欢的主题风格</p>
      <div class="theme-grid" id="theme-grid">
        <div class="theme-card" data-theme="default">
          <div class="theme-preview-box default-theme">
            <div class="preview-header"></div>
            <div class="preview-body">
              <div class="preview-item"></div>
              <div class="preview-item"></div>
              <div class="preview-item"></div>
            </div>
          </div>
          <div class="theme-card-label">☀️ <span data-i18n="themeDefault">默认</span></div>
          <span class="theme-check" style="display:none;">✓</span>
        </div>
        <div class="theme-card" data-theme="dark">
          <div class="theme-preview-box dark-theme">
            <div class="preview-header"></div>
            <div class="preview-body">
              <div class="preview-item"></div>
              <div class="preview-item"></div>
              <div class="preview-item"></div>
            </div>
          </div>
          <div class="theme-card-label">🌙 <span data-i18n="themeDark">暗黑</span></div>
          <span class="theme-check" style="display:none;">✓</span>
        </div>
        <div class="theme-card" data-theme="ocean">
          <div class="theme-preview-box ocean-theme">
            <div class="preview-header"></div>
            <div class="preview-body">
              <div class="preview-item"></div>
              <div class="preview-item"></div>
              <div class="preview-item"></div>
            </div>
          </div>
          <div class="theme-card-label">🌊 <span data-i18n="themeOcean">海洋</span></div>
          <span class="theme-check" style="display:none;">✓</span>
        </div>
        <div class="theme-card" data-theme="sakura">
          <div class="theme-preview-box sakura-theme">
            <div class="preview-header"></div>
            <div class="preview-body">
              <div class="preview-item"></div>
              <div class="preview-item"></div>
              <div class="preview-item"></div>
            </div>
          </div>
          <div class="theme-card-label">🌸 <span data-i18n="themeSakura">樱花</span></div>
          <span class="theme-check" style="display:none;">✓</span>
        </div>
      </div>
    </section>

    <!-- 行为设置 -->
    <section class="options-section">
      <h2>⚙️ <span data-i18n="behaviorSettings">行为设置</span></h2>
      <div class="setting-group">
        <div class="setting-item">
          <label for="slow-threshold" data-i18n="slowLoadThreshold">慢加载阈值 (ms)</label>
          <input type="number" id="slow-threshold" min="100" max="10000" step="100" value="1000">
          <span class="setting-hint" data-i18n="slowLoadHint">超过此时间的资源将被标记为「慢加载」</span>
        </div>
        <div class="setting-item">
          <label for="default-tab" data-i18n="defaultTab">默认分类 Tab</label>
          <select id="default-tab">
            <option value="images">🖼️ <span data-i18n="tabImages">图片</span></option>
            <option value="scripts">📜 <span data-i18n="tabScripts">脚本</span></option>
            <option value="styles">🎨 <span data-i18n="tabStyles">样式</span></option>
            <option value="fonts">🔤 <span data-i18n="tabFonts">字体</span></option>
            <option value="videos">🎬 <span data-i18n="tabVideos">视频</span></option>
            <option value="audios">🔊 <span data-i18n="tabAudios">音频</span></option>
            <option value="links">🔗 <span data-i18n="tabLinks">链接</span></option>
            <option value="third-party">📦 <span data-i18n="tabThirdParty">第三方</span></option>
          </select>
        </div>
        <div class="setting-item">
          <label for="export-format" data-i18n="defaultExportFormat">默认导出格式</label>
          <select id="export-format">
            <option value="zip" data-i18n="exportZip">📦 ZIP 压缩包</option>
            <option value="urls" data-i18n="exportUrls">📝 URL 列表 (.txt)</option>
          </select>
        </div>
        <div class="setting-item checkbox-item">
          <label>
            <input type="checkbox" id="show-size" checked>
            <span data-i18n="showResourceSize">显示资源大小</span>
          </label>
        </div>
        <div class="setting-item checkbox-item">
          <label>
            <input type="checkbox" id="show-duration" checked>
            <span data-i18n="showLoadDuration">显示加载耗时</span>
          </label>
        </div>
      </div>
    </section>

    <!-- 关于作者 -->
    <section class="options-section">
      <h2>👨‍💻 <span data-i18n="aboutDeveloper">关于开发者</span></h2>
      <div class="about-box">
        <div class="about-avatar">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"/>
          </svg>
        </div>
        <div class="about-info">
          <h3>supercj</h3>
          <p class="about-desc" data-i18n="developerIntro">全栈开发者，专注于浏览器扩展和 Web 工具开发</p>
          <div class="about-links">
            <a href="https://github.com/supercj" target="_blank" class="about-link">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
              </svg>
              GitHub
            </a>
            <a href="https://github.com/supercj/web-resource-extractor" target="_blank" class="about-link">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M1.5 2.5A1.5 1.5 0 013 1h10a1.5 1.5 0 011.5 1.5v3.586a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l2.5-2.5zm2.5 6l3.293 3.293 5.793-5.793V2.5a.5.5 0 00-.5-.5H3a.5.5 0 00-.5.5v3.586l1.5 1.5z"/>
                <circle cx="9.5" cy="4.5" r="1.5"/>
              </svg>
              <span data-i18n="projectRepo">项目仓库</span>
            </a>
            <a href="https://github.com/supercj/web-resource-extractor/issues" target="_blank" class="about-link">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zM6.92 5.5c.433-.435 1.05-.644 1.58-.644.437 0 .845.14 1.16.397.315.256.504.626.504 1.047 0 .446-.174.844-.476 1.133-.097.092-.232.208-.393.343l-.022.02-.02.02c-.17.164-.31.315-.413.48-.104.165-.143.337-.143.515V9h-1.5V8.167c0-.456.131-.818.336-1.094.205-.276.474-.51.736-.742l.02-.02c.15-.142.283-.27.384-.377A.68.68 0 008.5 5.5a.436.436 0 00-.14-.323.503.503 0 00-.36-.127c-.28 0-.482.15-.613.282a.91.91 0 00-.237.47L6 5.5z"/>
              </svg>
              <span data-i18n="reportIssue">反馈问题</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- 保存按钮 -->
    <div class="options-footer">
      <button id="btn-save" class="btn-save">💾 <span data-i18n="saveSettings">保存设置</span></button>
      <button id="btn-reset" class="btn-reset">🔄 <span data-i18n="resetDefaults">恢复默认</span></button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
